<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lista de Tarefas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Minha Lista de Tarefas</h1>

    <p id="contador"></p>

    <div id="filtros">
        <button id="filtroTodas">Todas</button>
        <button id="filtroPendentes">Pendentes</button>
        <button id="filtroConcluidas">Concluídas</button>
    </div>

    <div class="controle">

        <input id="inputTarefa" type="text" placeholder="Digite uma tarefa" />

        <button id="btnAdicionar">Adicionar</button>

        <button id="btnLimpar">Limpar Tudo</button>

    </div>

    <div class="kanban">

        <div class="coluna" id="todo">
            <h2>A Fazer</h2>
            <div class="lista"></div>
        </div>

        <div class="coluna" id="doing">
            <h2>Fazendo</h2>
            <div class="lista"></div>
        </div>

        <div class="coluna" id="done">
            <h2>Concluído</h2>
            <div class="lista"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
